name: Validate Pull Request

# Minimal permissions: read code, write PR comments.
permissions:
  contents: read
  pull-requests: write

# Uses pull_request_target to access secrets for PR comments on forks.
on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - labeled
      - unlabeled

# Avoid racing on PR comments when multiple events fire quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-title-and-commits:
    name: Validate Title and Commits
    runs-on: ubuntu-slim
    timeout-minutes: 3

    if: >-
      !contains(fromJSON('["labeled", "unlabeled"]'), github.event.action)
      || contains(fromJSON('["Squash", "Rebase"]'), github.event.label.name)

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BASE_REF: ${{ github.base_ref }}
      REPO: ${{ github.repository }}
      POST_VALIDATE_COMMENT: ${{ vars.POST_VALIDATE_COMMENT }}

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0

      - name: Fetch PR head
        run: git fetch origin "$PR_HEAD_SHA"

      - name: Apply merge method labels from PR description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABEL_LINES=$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH")

          if echo "$LABEL_LINES" | grep -qx "Squash\|Rebase"; then
            echo "Merge method label already present, skipping description scan." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")

          if echo "$BODY" | grep -qi 'squash[- ]\?merge\|squash and merge\|merge by squash\|merge with squash'; then
            if gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "Squash"; then
              echo "Applied **Squash** label from PR description." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Could not apply **Squash** label." >> "$GITHUB_STEP_SUMMARY"
            fi
          elif echo "$BODY" | grep -qi 'rebase[- ]\?merge\|rebase and merge\|merge by rebase\|merge with rebase'; then
            if gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "Rebase"; then
              echo "Applied **Rebase** label from PR description." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Could not apply **Rebase** label." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Detect merge method labels
        id: labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABEL_LINES=$(gh api "repos/$REPO/issues/$PR_NUMBER/labels" --jq '.[].name')
          echo "all=$(echo "$LABEL_LINES" | tr '\n' ',')" >> "$GITHUB_OUTPUT"

          CONFLICT="false"
          if echo "$LABEL_LINES" | grep -qx "Squash" && echo "$LABEL_LINES" | grep -qx "Rebase"; then
            echo "::error::Both Squash and Rebase labels are present. Remove one."
            CONFLICT="true"
          fi

          if [ "$CONFLICT" = "false" ] && echo "$LABEL_LINES" | grep -qx "Squash"; then
            echo "squash=true" >> "$GITHUB_OUTPUT"
            echo "Detected **Squash** label: only PR title will be validated." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "squash=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$LABEL_LINES" | grep -qx "Rebase"; then
            echo "rebase=true" >> "$GITHUB_OUTPUT"
            echo "Detected **Rebase** label: all commits and PR title will be validated." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "rebase=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$CONFLICT" = "true" ]; then
            exit 1
          fi

      # Continue after label conflict so validation still runs and posts feedback.
      - name: Load valid tags
        id: load-tags
        if: success() || failure()
        run: |
          TAGS_FILE=".github/workflows/valid-tags.txt"

          if [ ! -f "$TAGS_FILE" ]; then
            echo "::error::$TAGS_FILE file not found"
            exit 1
          fi

          # Normalize line endings and remove empty lines
          TAGS=$(tr -d '\r' < "$TAGS_FILE" | sed '/^$/d')

          VALID_TAGS=$(echo "$TAGS" | tr '\n' ',' | sed 's/,$//; s/,/, /g')
          echo "**Valid tags**: $VALID_TAGS" >> "$GITHUB_STEP_SUMMARY"
          echo "valid-tags=$VALID_TAGS" >> "$GITHUB_OUTPUT"

          TAG_REGEX=$(echo "$TAGS" | paste -sd "|" -)

          # Matches:
          #   Conventional commit: type or type(scope) followed by colon, single space, then uppercase text
          REGEX="^(($TAG_REGEX)(\\([^)]+\\))?: [A-Z].*)$"
          echo "regex=$REGEX" >> "$GITHUB_OUTPUT"
          echo "Built the regex: $REGEX"

      - name: Validate PR title
        id: validate-title
        if: (success() || failure()) && steps.load-tags.outcome == 'success'
        env:
          REGEX: ${{ steps.load-tags.outputs.regex }}
        run: |
          echo "### Validate PR Title" >> "$GITHUB_STEP_SUMMARY"
          TITLE=$(jq -r '.pull_request.title // "No title found"' "$GITHUB_EVENT_PATH")

          if [[ ! "$TITLE" =~ $REGEX ]]; then
            echo "- ❌ PR title \"$TITLE\" is invalid." >> "$GITHUB_STEP_SUMMARY"
            echo "title-valid=false" >> "$GITHUB_OUTPUT"
            DELIM="TITLE_EOF_$(openssl rand -hex 8)"
            {
              echo "INVALID_TITLE<<$DELIM"
              echo "$TITLE"
              echo "$DELIM"
            } >> "$GITHUB_ENV"
          else
            echo "- ✅ PR title \"$TITLE\" is valid." >> "$GITHUB_STEP_SUMMARY"
            echo "title-valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate PR commits
        id: validate-commits
        if: (success() || failure()) && steps.load-tags.outcome == 'success' && steps.labels.outputs.squash != 'true'
        env:
          REGEX: ${{ steps.load-tags.outputs.regex }}
        run: |
          echo "### Validate PR Commits" >> "$GITHUB_STEP_SUMMARY"
          COMMITS=$(git log "$BASE_REF".."$PR_HEAD_SHA" --pretty=format:"%s" --no-merges)

          if [[ -z "$COMMITS" ]]; then
            echo "- ⚠️ No non-merge commits found." >> "$GITHUB_STEP_SUMMARY"
            echo "commits-valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          INVALID_COMMITS=0
          INVALID_LIST=""

          while IFS= read -r COMMIT_MSG; do
            if [[ -z "$COMMIT_MSG" ]]; then
              continue
            fi
            if [[ ! "$COMMIT_MSG" =~ $REGEX ]]; then
              echo "- ❌ Commit message \"$COMMIT_MSG\" is invalid." >> "$GITHUB_STEP_SUMMARY"
              INVALID_COMMITS=$((INVALID_COMMITS + 1))
              SANITIZED_MSG=$(echo "$COMMIT_MSG" | tr -d '\`')
              INVALID_LIST="${INVALID_LIST}- \`${SANITIZED_MSG}\`"$'\n'
            else
              echo "- ✅ Commit message \"$COMMIT_MSG\" is valid." >> "$GITHUB_STEP_SUMMARY"
            fi
          done <<< "$COMMITS"

          if [[ $INVALID_COMMITS -gt 0 ]]; then
            echo "commits-valid=false" >> "$GITHUB_OUTPUT"
            DELIM="COMMITS_EOF_$(openssl rand -hex 8)"
            {
              echo "INVALID_COMMITS_LIST<<$DELIM"
              printf '%s' "$INVALID_LIST"
              echo "$DELIM"
            } >> "$GITHUB_ENV"
          else
            echo "commits-valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine validation result
        id: result
        if: always() && steps.load-tags.outcome == 'success'
        run: |
          TITLE_FAILED="false"
          COMMITS_FAILED="false"

          if [[ "${{ steps.validate-title.outcome }}" == "success" && "${{ steps.validate-title.outputs.title-valid }}" != "true" ]]; then
            TITLE_FAILED="true"
          fi

          if [[ "${{ steps.validate-commits.outcome }}" == "success" && "${{ steps.validate-commits.outputs.commits-valid }}" != "true" ]]; then
            COMMITS_FAILED="true"
          fi

          if [[ "$TITLE_FAILED" == "true" || "$COMMITS_FAILED" == "true" ]]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      # Delete old bot comments before posting a new one or when validation now passes.
      - name: Delete stale bot comments
        if: always() && env.POST_VALIDATE_COMMENT != 'false' && steps.load-tags.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("### ⚠️ Title/Commit Validation Failed"))) | .id' \
            | while read -r comment_id; do
                gh api -X DELETE "repos/$REPO/issues/comments/$comment_id" || true
              done || true

      # Post a new failure comment with details on what's wrong.
      - name: Comment on PR if validation failed
        if: always() && env.POST_VALIDATE_COMMENT != 'false' && steps.result.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VALID_TAGS_RAW: ${{ steps.load-tags.outputs.valid-tags }}
          IS_SQUASH: ${{ steps.labels.outputs.squash }}
        run: |
          VALID_TAGS=$(echo "$VALID_TAGS_RAW" | sed 's/[^, ][^, ]*/`&`/g')
          BODY="### ⚠️ Title/Commit Validation Failed"

          if [[ -n "$INVALID_TITLE" ]]; then
            SANITIZED_TITLE=$(echo "$INVALID_TITLE" | tr -d '\`')
            BODY="$BODY"$'\n\n'"**Invalid PR title:**"
            BODY="$BODY"$'\n'"- \`$SANITIZED_TITLE\`"
          fi

          if [[ -n "$INVALID_COMMITS_LIST" ]]; then
            BODY="$BODY"$'\n\n'"**Invalid commit messages:**"
            BODY="$BODY"$'\n'"$INVALID_COMMITS_LIST"
          fi

          BODY="$BODY"$'\n\n'"PR titles and commit messages must follow [conventional commits](https://www.conventionalcommits.org/en/v1.0.0/) format:"
          BODY="$BODY"$'\n'"\`\`\`"
          BODY="$BODY"$'\n'"type: Description"
          BODY="$BODY"$'\n'"type(scope): Description"
          BODY="$BODY"$'\n'"\`\`\`"
          BODY="$BODY"$'\n\n'"**Allowed types:** $VALID_TAGS"

          if [[ "$IS_SQUASH" != "true" ]]; then
            BODY="$BODY"$'\n\n'"ℹ️ Add the \`Squash\` label to skip commit validation."
          fi

          BODY="$BODY"$'\n\n'"See [CONTRIBUTING.md](https://github.com/$REPO/blob/$BASE_REF/CONTRIBUTING.md#pull-request-documentation) for details."

          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$BODY"

      # Separate fail step so the comment is always posted before the job fails.
      - name: Fail if validation did not pass
        if: always() && steps.result.outputs.failed == 'true'
        run: exit 1
